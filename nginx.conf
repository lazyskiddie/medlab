# ── nginx.conf for MedLab production ─────────────────────────────────────────
# Place this file at /etc/nginx/sites-available/medlab
# Then: sudo ln -s /etc/nginx/sites-available/medlab /etc/nginx/sites-enabled/
# And:  sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Django/gunicorn running on 127.0.0.1:8000
#   - Static files collected to /app/staticfiles/
#   - Media files at /app/media/
#   - SSL cert managed by certbot (uncomment the SSL block below)

upstream django_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (uncomment when SSL is configured) ──────────────────
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;  # uncomment for SSL
    server_name yourdomain.com www.yourdomain.com localhost;

    # ── SSL certificates (certbot auto-fills these) ───────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "geolocation=()"    always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Upload size limit — 50 MB for lab report images/PDFs ─────────────────
    client_max_body_size 50M;

    # ── Timeouts (long for fine-tuning health check) ──────────────────────────
    proxy_connect_timeout  60s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ── Static files — served directly by nginx (no Django overhead) ──────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media files — uploaded reports and generated PDFs ────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "private";
        # Protect training data from direct browser access
        location /media/training_data/ {
            deny all;
            return 403;
        }
    }

    # ── Health check — fast path, no upstream logging ─────────────────────────
    location = /api/health/ {
        proxy_pass         http://django_app;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── All other requests → Django/gunicorn ─────────────────────────────────
    location / {
        proxy_pass          http://django_app;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_redirect      off;

        # WebSocket support (if added later)
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
    }

    # ── Block access to sensitive files ───────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(env|sqlite3|log|pyc)$ {
        deny all;
        return 404;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml application/xml
                      application/xml+rss text/javascript;
}